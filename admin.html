<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin Pro | SLJ Otaku Paradise</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        :root {
            --admin-accent: #ff6b00;
            --admin-accent-gradient: linear-gradient(135deg, #ff6b00, #ff8c33);
            --admin-bg: #050505;
            --admin-card: #0f0f0f;
            --admin-sidebar: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #e0e0e0;
            --text-dim: #888;
        }

        body {
            background-color: var(--admin-bg);
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

        /* Layout Architecture */
        .admin-wrapper {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
            display: none; /* Show after lock */
        }

        .admin-sidebar {
            background: var(--admin-sidebar);
            padding: 40px 20px;
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .admin-sidebar .logo {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 50px;
            padding-left: 20px;
        }

        .nav-group { flex-grow: 1; }

        .admin-nav-item {
            padding: 15px 20px;
            border-radius: 15px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
            gap: 15px;
            color: var(--text-dim);
            font-weight: 500;
        }
        .admin-nav-item:hover { color: white; background: var(--glass); transform: translateX(5px); }
        .admin-nav-item.active { background: var(--admin-accent-gradient); color: white; box-shadow: 0 10px 20px rgba(255,107,0,0.2); }

        /* Content Area */
        .admin-content {
            padding: 50px;
            background: radial-gradient(circle at 0% 0%, #111 0%, #050505 100%);
        }

        .section-header {
            margin-bottom: 40px;
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }
        .section-header h1 { font-size: 2.5rem; font-weight: 900; margin: 0; color: white; }
        .section-header p { color: var(--text-dim); margin-top: 5px; }

        /* Stat Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }
        .stat-card {
            background: var(--admin-card);
            padding: 30px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: var(--admin-accent); background: rgba(255,107,0,0.02); }
        .stat-card h4 { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; margin: 0 0 10px; letter-spacing: 1px; }
        .stat-card .value { font-size: 2.2rem; font-weight: 800; color: white; }

        /* Search & Actions Bar */
        .actions-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            gap: 20px;
        }
        .search-container { position: relative; flex-grow: 1; max-width: 400px; }
        .search-bar {
            width: 100%;
            padding: 14px 20px 14px 45px;
            background: #111;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 15px;
            font-family: inherit;
        }
        .search-icon { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); color: var(--text-dim); }

        /* Tables & Data */
        .table-container {
            background: var(--admin-card);
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        .data-table { width: 100%; border-collapse: collapse; table-layout: auto; }
        .data-table th {
            background: rgba(255,255,255,0.02);
            padding: 20px 25px;
            text-align: left;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
            border-bottom: 1px solid var(--glass-border);
        }
        .data-table td {
            padding: 18px 25px;
            border-bottom: 1px solid var(--glass-border);
            font-size: 0.95rem;
            vertical-align: middle;
        }
        .data-table tr:hover td { background: rgba(255,255,255,0.01); }

        /* Column Specifics */
        .col-image { width: 80px; text-align: center; }
        .col-actions { width: 180px; text-align: right; }
        .col-status { width: 120px; }

        /* Components */
        .prod-img {
            width: 50px; height: 50px;
            border-radius: 12px;
            object-fit: cover;
            border: 1px solid var(--glass-border);
            display: block;
        }
        .badge {
            padding: 6px 12px;
            border-radius: 10px;
            font-size: 0.7rem;
            font-weight: 700;
        }
        .badge-success { background: rgba(0, 255, 127, 0.1); color: #00ff7f; }
        .badge-danger { background: rgba(255, 50, 50, 0.1); color: #ff3232; }
        .badge-info { background: rgba(0, 191, 255, 0.1); color: #00bfff; }
        .badge-warning { background: rgba(255, 165, 0, 0.1); color: #ffa500; }

        .action-btn {
            padding: 10px;
            border-radius: 10px;
            background: #1a1a1a;
            color: var(--text-dim);
            border: 1px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .action-btn:hover { background: #222; color: white; border-color: #333; }
        .action-btn.danger:hover { color: #ff3232; border-color: rgba(255,50,50,0.2); }

        select {
            background: #111;
            color: white;
            border: 1px solid var(--glass-border);
            padding: 8px 12px;
            border-radius: 10px;
            cursor: pointer;
        }

        .btn-primary {
            background: var(--admin-accent-gradient);
            border: none;
            padding: 14px 25px;
            border-radius: 15px;
            color: white;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255,107,0,0.2);
            transition: 0.3s;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 30px rgba(255,107,0,0.3); }

        /* Form Overlay */
        .form-panel {
            background: var(--admin-card);
            padding: 35px;
            border-radius: 25px;
            border: 1px solid var(--glass-border);
            margin-bottom: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; color: var(--text-dim); font-size: 0.85rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #000;
            border: 1px solid var(--glass-border);
            color: white;
            border-radius: 12px;
            font-family: inherit;
        }

        /* Lock Overlay */
        #admin-lock {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111, #000);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .lock-card {
            background: var(--admin-card);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--glass-border);
            width: 90%;
            max-width: 420px;
            animation: fadeIn 0.8s ease;
        }
    </style>
</head>
<body>

    <!-- Admin Lock Overlay -->
    <div id="admin-lock">
        <div class="lock-card">
            <div style="background: rgba(255,107,0,0.1); width: 80px; height: 80px; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: 0 auto 30px;">
                <svg width="35" height="35" viewBox="0 0 24 24" fill="none" stroke="#ff6b00" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            </div>
            <h2 style="font-weight:900; font-size:2rem; margin-bottom:10px;">Accès Admin</h2>
            <p style="color: var(--text-dim); margin-bottom: 30px;">Panel de gestion SLJ Otaku</p>
            <input type="password" id="admin-password-input" placeholder="••••" style="width:100%; padding:18px; background:#000; border:1px solid var(--glass-border); color:white; border-radius:15px; margin-bottom:25px; text-align:center; font-size:1.5rem; letter-spacing:8px;">
            <button class="btn-primary" onclick="unlockAdmin()" style="width: 100%;">Déverrouiller</button>
            <p id="lock-error" style="color: #ff3232; margin-top: 20px; font-weight: 600; display: none;">Code incorrect</p>
        </div>
    </div>

    <!-- Admin Wrapper -->
    <div class="admin-wrapper" id="admin-ui">
        <aside class="admin-sidebar">
            <div class="logo">SLJ <span style="color:var(--admin-accent)">ADMIN</span></div>
            <div class="nav-group">
                <div class="admin-nav-item" id="nav-dashboard" onclick="showSection('dashboard')">Dashboard</div>
                <div class="admin-nav-item" id="nav-users" onclick="showSection('users')">Utilisateurs</div>
                <div class="admin-nav-item" id="nav-orders" onclick="showSection('orders')">Commandes</div>
                <div class="admin-nav-item" id="nav-products" onclick="showSection('products')">Produits</div>
                <div class="admin-nav-item" id="nav-ads" onclick="showSection('ads')">Publicités</div>
            </div>
            <div class="admin-nav-item" onclick="location.href='index.html'" style="color: #ff3232; margin-top: 20px; background: rgba(255,50,50,0.05);">Quitter</div>
        </aside>

        <main class="admin-content">
            <div id="section-view">
                <!-- Content Injected -->
            </div>
        </main>
    </div>

    <script src="js/products.js"></script>
    <script src="js/db.js"></script>
    <script>
        function unlockAdmin() {
            const pass = document.getElementById('admin-password-input').value;
            if (pass === 'emmi') {
                document.getElementById('admin-lock').style.display = 'none';
                document.getElementById('admin-ui').style.display = 'grid';
                showSection('dashboard');
            } else {
                document.getElementById('lock-error').style.display = 'block';
            }
        }

        function showSection(name) {
            document.querySelectorAll('.admin-nav-item').forEach(i => i.classList.remove('active'));
            const activeItem = document.getElementById('nav-' + name);
            if(activeItem) activeItem.classList.add('active');

            const view = document.getElementById('section-view');
            if (name === 'dashboard') renderDashboard(view);
            if (name === 'users') renderUsers(view);
            if (name === 'orders') renderOrders(view);
            if (name === 'products') renderProducts(view);
            if (name === 'ads') renderAds(view);
        }

        // --- RENDERERS ---

        function renderDashboard(view) {
            const stats = db.getStats();
            view.innerHTML = `
                <div class="section-header">
                    <div><h1>Dashboard</h1><p>Aperçu des performances de la boutique</p></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card" onclick="showSection('orders')"><h4>Revenu</h4><div class="value">${stats.totalRevenue}€</div></div>
                    <div class="stat-card" onclick="showSection('orders')"><h4>Commandes</h4><div class="value">${stats.totalOrders}</div></div>
                    <div class="stat-card" onclick="showSection('users')"><h4>Clients</h4><div class="value">${stats.totalCustomers}</div></div>
                    <div class="stat-card" onclick="showSection('products')"><h4>Produits</h4><div class="value">${stats.totalProducts}</div></div>
                </div>
                <div class="table-container">
                    <div style="padding: 25px; border-bottom: 1px solid var(--glass-border); font-weight:800;">Activité Récente</div>
                    <table class="data-table">
                        <thead><tr><th>Action</th><th>Détails</th><th>Date</th></tr></thead>
                        <tbody>
                            <tr><td>🛒 Commande</td><td>ORD-1002 passée par Dani_x</td><td>Aujourd'hui</td></tr>
                            <tr><td>👤 Inscription</td><td>Nouvel utilisateur enregistré</td><td>Aujourd'hui</td></tr>
                        </tbody>
                    </table>
                </div>
            `;
        }

        function renderUsers(view, search = '') {
            const filtered = db.customers.filter(u => u.username.toLowerCase().includes(search.toLowerCase()) || u.email.toLowerCase().includes(search.toLowerCase()));
            view.innerHTML = `
                <div class="section-header">
                    <div><h1>Utilisateurs</h1><p>Gestion des comptes clients</p></div>
                </div>
                <div class="actions-bar">
                    <div class="search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-bar" placeholder="Nom ou email..." value="${search}" oninput="renderUsers(document.getElementById('section-view'), this.value)">
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th>Nom</th><th>Email</th><th>Ville</th><th class="col-status">Statut</th><th class="col-actions">Actions</th></tr></thead>
                        <tbody>
                            ${filtered.map(u => `
                                <tr>
                                    <td style="font-weight:700">${u.username}</td>
                                    <td>${u.email}</td>
                                    <td>${u.city || '-'}</td>
                                    <td><span class="badge ${u.active !== false ? 'badge-success' : 'badge-danger'}">${u.active !== false ? 'Actif' : 'Désactivé'}</span></td>
                                    <td>
                                        ${u.role !== 'admin' ? `
                                        <button class="action-btn" onclick="adminToggleUser(${u.id})" title="${u.active !== false ? 'Désactiver' : 'Réactiver'}">
                                            ${u.active !== false ? '🔒 Désactiver' : '✅ Réactiver'}
                                        </button>
                                        <button class="action-btn danger" onclick="adminDeleteUser(${u.id})">🗑️ Supprimer</button>
                                        ` : '<span style="color:var(--text-dim);font-size:0.8rem;">Protégé</span>'}
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        const ADMIN_STATUS_ORDER = ['en_attente','confirmee','en_preparation','expediee','livree'];
        const ADMIN_STATUS_LABELS = { en_attente:'En attente', confirmee:'Confirmée', en_preparation:'En préparation', expediee:'Expédiée', livree:'Livrée', annulee:'Annulée' };
        const ADMIN_STATUS_NEXT  = { en_attente:'Confirmer', confirmee:'Mettre en préparation', en_preparation:'Marquer expédiée', expediee:'Marquer livrée' };

        function renderOrders(view, search = '') {
            const filtered = db.orders.filter(o => {
                const q = search.toLowerCase();
                return (o.username || '').toLowerCase().includes(q) || o.id.toString().includes(q) || (o.email||'').toLowerCase().includes(q);
            }).sort((a,b) => (b.createdAt||0) - (a.createdAt||0));

            const cancelPendingOrders = db.orders.filter(o => o.cancelRequested && (Date.now() - o.cancelRequestedAt) >= 2 * 60 * 1000);

            view.innerHTML = `
                <div class="section-header">
                    <div><h1>Commandes</h1><p>Suivi des ventes et livraisons</p></div>
                </div>
                ${cancelPendingOrders.length > 0 ? `
                <div style="background:rgba(255,51,102,0.08); border:1px solid rgba(255,51,102,0.25); border-radius:16px; padding:16px 22px; margin-bottom:24px; display:flex; align-items:center; gap:12px;">
                    <span style="color:#ff3366; font-size:1.3rem;">⚠️</span>
                    <div>
                        <strong style="color:#ff3366;">${cancelPendingOrders.length} commande(s) à supprimer</strong>
                        <div style="color:var(--text-dim); font-size:0.82rem; margin-top:2px;">Le délai de rétraction de 2 min est écoulé. Suppression autorisée.</div>
                    </div>
                </div>` : ''}
                <div class="actions-bar">
                    <div class="search-container">
                        <span class="search-icon">🔍</span>
                        <input type="text" class="search-bar" placeholder="Client, ID, email..." value="${search}" oninput="renderOrders(document.getElementById('section-view'), this.value)">
                    </div>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>ID / Date</th>
                                <th>Client</th>
                                <th>Articles</th>
                                <th>Total</th>
                                <th>Statut</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${filtered.map(o => {
                                const statusLabel = ADMIN_STATUS_LABELS[o.status] || o.status;
                                const statusIdx   = ADMIN_STATUS_ORDER.indexOf(o.status);
                                const canAdvance  = statusIdx > -1 && statusIdx < ADMIN_STATUS_ORDER.length - 1 && !o.cancelRequested;
                                const nextLabel   = ADMIN_STATUS_NEXT[o.status] || '';
                                const elapsed     = o.cancelRequested ? (Date.now() - o.cancelRequestedAt) : 0;
                                const canDelete   = o.cancelRequested && elapsed >= 2 * 60 * 1000;
                                const cancelInfo  = o.cancelRequested && !canDelete
                                    ? `<div style="font-size:0.72rem; color:#ffa500; margin-top:4px;">⏳ Annulation demandée — attente</div>`
                                    : canDelete
                                    ? `<div style="font-size:0.72rem; color:#ff3366; margin-top:4px;">🔴 Suppression autorisée</div>`
                                    : '';

                                const itemsSummary = (o.items || []).slice(0,3).map(i => `<span style="display:inline-block; background:#1a1a1a; border:1px solid var(--glass-border); border-radius:6px; padding:2px 8px; font-size:0.7rem; margin:2px;">${i.qty}× ${(i.name||'').split(' ').slice(0,3).join(' ')}</span>`).join('') + (o.items && o.items.length > 3 ? `<span style="font-size:0.72rem; color:var(--text-dim);">+${o.items.length-3}</span>` : '');

                                return `
                                <tr style="${canDelete ? 'background:rgba(255,51,102,0.03)' : ''}">
                                    <td>
                                        <div style="font-weight:800; font-size:0.85rem;">${o.id}</div>
                                        <div style="font-size:0.72rem; color:var(--text-dim);">${o.date}</div>
                                    </td>
                                    <td>
                                        <div style="font-weight:700">${o.username || 'Client #'+o.customerId}</div>
                                        <div style="font-size:0.72rem; color:var(--text-dim);">${o.email || ''}</div>
                                        <div style="font-size:0.72rem; color:var(--text-dim);">${o.city || ''} ${o.postalCode || ''}</div>
                                    </td>
                                    <td style="max-width:200px">${itemsSummary}</td>
                                    <td style="color:var(--admin-accent); font-weight:800">${parseFloat(o.total||0).toFixed(2)} €</td>
                                    <td>
                                        <span class="badge ${getStatusBadge(o.status)}">${statusLabel}</span>
                                        ${cancelInfo}
                                    </td>
                                    <td>
                                        ${canAdvance ? `<button class="action-btn" title="${nextLabel}" onclick="advanceStatus('${o.id}')" style="background:rgba(255,107,0,0.08); color:var(--admin-accent); border-color:rgba(255,107,0,0.2); font-size:0.78rem; padding:8px 12px; white-space:nowrap;">→ ${nextLabel}</button>` : ''}
                                        ${canDelete ? `<button class="action-btn danger" onclick="confirmDeleteOrder('${o.id}')" style="font-size:0.78rem; padding:8px 12px;">🗑️ Supprimer</button>` : ''}
                                        ${o.status === 'livree' ? `<span style="font-size:0.78rem; color:#00b386;">✓ Terminé</span>` : ''}
                                        ${!canAdvance && !canDelete && o.status !== 'livree' && !o.cancelRequested ? `<span style="font-size:0.72rem; color:var(--text-dim);">En cours</span>` : ''}
                                    </td>
                                </tr>`;
                            }).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function advanceStatus(orderId) {
            const order = db.orders.find(o => o.id === orderId);
            if (!order) return;
            const labels = { confirmee:'commande confirmée', en_preparation:'mise en préparation', expediee:'expédiée', livree:'livrée' };
            const newStatus = db.advanceOrderStatus(orderId);
            if (newStatus) {
                renderOrders(document.getElementById('section-view'));
            }
        }

        function confirmDeleteOrder(orderId) {
            if (confirm('Supprimer définitivement cette commande annulée ?')) {
                const ok = db.adminDeleteOrder(orderId);
                if (ok) {
                    renderOrders(document.getElementById('section-view'));
                } else {
                    alert('Suppression impossible : le délai de 2 minutes n\'est pas encore écoulé.');
                }
            }
        }

        function renderProducts(view) {
            view.innerHTML = `
                <div class="section-header">
                    <div><h1>Produits</h1><p>Gestion du catalogue otaku</p></div>
                    <button class="btn-primary" onclick="openProductModal()">+ Ajouter un Produit</button>
                </div>
                
                <div id="product-form-container" class="form-panel" style="display:none; animation: slideDown 0.4s ease;">
                    <h3 id="prod-form-title">Nouveau Produit</h3>
                    <input type="hidden" id="edit-prod-id">
                    <div class="form-grid">
                        <div class="form-group"><label>Nom du Produit</label><input type="text" id="prod-name"></div>
                        <div class="form-group">
                            <label>Catégorie</label>
                            <select id="prod-category">
                                <option value="figures">Figurines</option>
                                <option value="vetements">Vêtements</option>
                                <option value="accessoires">Accessoires</option>
                                <option value="posters">Posters</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Série / Manga d'origine</label>
                            <select id="prod-anime-select" onchange="toggleNewAnimeInput(this.value)">
                                <option value="">-- Choisir une série --</option>
                                ${db.getUniqueAnimes().map(a => `<option value="${a}">${a}</option>`).join('')}
                                <option value="NEW">+ Ajouter une nouvelle série...</option>
                            </select>
                            <input type="text" id="prod-anime-new" placeholder="Nom de la nouvelle série" style="display:none; margin-top:10px;">
                        </div>
                        <div class="form-group"><label>Prix (€)</label><input type="number" id="prod-price" step="0.01"></div>
                        <div class="form-group"><label>Image</label><input type="file" onchange="previewImage(this)"><input type="hidden" id="prod-image-data"></div>
                    </div>
                    <div id="image-preview-container" style="margin-bottom:20px; display:none;"><img id="image-preview" class="prod-img" style="width:100px; height:100px;"></div>
                    <button class="btn-primary" onclick="saveProduct()">Enregistrer</button>
                    <button class="action-btn" onclick="document.getElementById('product-form-container').style.display='none'">Annuler</button>
                </div>

                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th class="col-image">Image</th><th>Nom</th><th>Série</th><th>Catégorie</th><th>Prix</th><th class="col-actions">Actions</th></tr></thead>
                        <tbody>
                            ${db.products.map(p => `
                                <tr>
                                    <td><img src="${p.image}" class="prod-img" onerror="this.src='https://via.placeholder.com/50?text=Error'"></td>
                                    <td style="white-space:normal; font-weight:700">${p.name}</td>
                                    <td><span class="badge" style="background:rgba(255,255,255,0.05); color:#ccc;">${p.anime || '-'}</span></td>
                                    <td><span class="badge badge-info">${p.category}</span></td>
                                    <td style="color:var(--admin-accent); font-weight:800">${p.price}€</td>
                                    <td>
                                        <button class="action-btn" onclick="editProduct(${p.id})">✏️</button>
                                        <button class="action-btn danger" onclick="if(confirm('Supprimer?')){db.deleteProduct(${p.id}); renderProducts(document.getElementById('section-view'))}">🗑️</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        function toggleNewAnimeInput(val) {
            const input = document.getElementById('prod-anime-new');
            input.style.display = (val === 'NEW') ? 'block' : 'none';
        }

        function saveProduct() {
            const id = document.getElementById('edit-prod-id').value;
            let anime = document.getElementById('prod-anime-select').value;
            if (anime === 'NEW') {
                anime = document.getElementById('prod-anime-new').value;
            }

            const name = document.getElementById('prod-name').value;
            const price = parseFloat(document.getElementById('prod-price').value);
            const category = document.getElementById('prod-category').value;
            const image = document.getElementById('prod-image-data').value;

            if (!name || !price || !anime) {
                alert("Veuillez remplir le nom, le prix et la série.");
                return;
            }

            const data = { name, price, category, anime, image: image || (id ? db.products.find(x=>x.id==id).image : '') };
            
            if(id) db.updateProduct(parseInt(id), data);
            else db.addProduct(data);
            
            renderProducts(document.getElementById('section-view'));
        }

        function editProduct(id) {
            const p = db.products.find(x => x.id === id);
            if(p) {
                openProductModal();
                document.getElementById('prod-form-title').textContent = "Modifier le Produit";
                document.getElementById('edit-prod-id').value = p.id;
                document.getElementById('prod-name').value = p.name;
                document.getElementById('prod-price').value = p.price;
                document.getElementById('prod-category').value = p.category;
                
                const animeSelect = document.getElementById('prod-anime-select');
                const hasAnime = Array.from(animeSelect.options).some(opt => opt.value === p.anime);
                
                if (hasAnime) {
                    animeSelect.value = p.anime;
                    document.getElementById('prod-anime-new').style.display = 'none';
                } else {
                    animeSelect.value = 'NEW';
                    document.getElementById('prod-anime-new').value = p.anime;
                    document.getElementById('prod-anime-new').style.display = 'block';
                }

                document.getElementById('prod-image-data').value = p.image;
                document.getElementById('image-preview').src = p.image;
                document.getElementById('image-preview-container').style.display = 'block';
            }
        }
        function renderAds(view) {
            view.innerHTML = `
                <div class="section-header">
                    <h1>Publicités</h1>
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead><tr><th>Titre</th><th>Type</th><th>Statut</th><th class="col-actions">Actions</th></tr></thead>
                        <tbody>
                            ${db.announcements.map(a => `
                                <tr>
                                    <td style="font-weight:700">${a.title}</td>
                                    <td>${a.type}</td>
                                    <td><span class="badge ${a.active?'badge-success':'badge-danger'}">${a.active?'Visible':'Masqué'}</span></td>
                                    <td>
                                        <button class="action-btn" onclick="db.toggleAnnouncement(${a.id}); renderAds(document.getElementById('section-view'))">Toggle</button>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `;
        }

        // --- Helpers & Logic ---
        function getStatusBadge(s) {
            if (s === 'livree')         return 'badge-success';
            if (s === 'annulee')        return 'badge-danger';
            if (s === 'expediee')       return 'badge-info';
            if (s === 'en_preparation') return 'badge-info';
            if (s === 'confirmee')      return 'badge-info';
            return 'badge-warning';
        }

        async function previewImage(input) {
            const file = input.files[0];
            if (!file) return;

            // Show immediate local preview while uploading
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('image-preview').src = e.target.result;
                document.getElementById('image-preview-container').style.display = 'block';
            };
            reader.readAsDataURL(file);

            // Upload to server
            const btnSave = document.querySelector('#product-form-container .btn-primary');
            if (btnSave) { btnSave.disabled = true; btnSave.textContent = '⏳ Upload en cours…'; }

            try {
                const formData = new FormData();
                formData.append('image', file);
                const res  = await fetch('/api/upload-image', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.url) {
                    document.getElementById('prod-image-data').value = data.url;
                    document.getElementById('image-preview').src     = data.url;
                    showAdminToast('✅ Image uploadée avec succès !', 'success');
                } else {
                    showAdminToast('❌ Erreur : ' + (data.error || 'Upload échoué'), 'error');
                }
            } catch (err) {
                showAdminToast('❌ Erreur réseau lors de l\'upload', 'error');
            } finally {
                if (btnSave) { btnSave.disabled = false; btnSave.textContent = 'Enregistrer'; }
            }
        }

        function adminToggleUser(userId) {
            const newActive = db.toggleUserStatus(userId);
            if (newActive === null) return;
            // Force logout if user is currently connected and was just deactivated
            if (newActive === false) {
                const loggedUser = JSON.parse(localStorage.getItem('slj_logged_user') || 'null');
                if (loggedUser && loggedUser.id === userId) {
                    localStorage.removeItem('slj_logged_user');
                }
            }
            renderUsers(document.getElementById('section-view'));
        }

        function adminDeleteUser(userId) {
            const user = db.customers.find(c => c.id === userId);
            if (!user || user.role === 'admin') return;
            if (!confirm(`Supprimer définitivement le compte de "${user.username}" ?`)) return;
            // Force logout if user is currently connected
            const loggedUser = JSON.parse(localStorage.getItem('slj_logged_user') || 'null');
            if (loggedUser && loggedUser.id === userId) {
                localStorage.removeItem('slj_logged_user');
            }
            db.deleteUser(userId);
            showAdminToast(`🗑️ Compte "${user.username}" supprimé.`, 'info');
            renderUsers(document.getElementById('section-view'));
        }

        function showAdminToast(msg, type) {
            const colors = { success: '#00b386', error: '#ff3366', info: '#ffa500' };
            const t = document.createElement('div');
            t.style.cssText = `position:fixed;top:24px;right:24px;background:#111;border:1px solid ${colors[type]||'#555'};color:white;padding:14px 22px;border-radius:14px;font-weight:700;z-index:9999;font-size:0.9rem;box-shadow:0 10px 30px rgba(0,0,0,0.5);transition:opacity 0.4s;`;
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; setTimeout(() => t.remove(), 400); }, 3000);
        }

        function openProductModal() {
            document.getElementById('product-form-container').style.display = 'block';
            document.getElementById('edit-prod-id').value = '';
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-price').value = '';
            document.getElementById('image-preview-container').style.display = 'none';
        }
    </script>
</body>
</html>
