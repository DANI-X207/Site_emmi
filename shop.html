<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boutique | SLJ Otaku Paradise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <script src="js/theme.js"></script>
    <script src="js/products.js"></script>
    <script src="js/db.js"></script>
    <script>
        if (!db.isLoggedIn()) {
            window.location.href = 'vitrine.html';
        }
    </script>

    <nav id="navbar">
        <div class="container">
            <a href="index.html" class="logo"><img src="images/logo.png" alt="SLJ OTAKU"></a>
            <div class="nav-links">
                <a href="index.html">Accueil</a>
                <a href="shop.html" class="active">Boutique</a>
                <a href="parametres.html">Paramètres</a>
            </div>
            <div class="nav-actions">
                <a href="admin.html" class="nav-icon" id="admin-icon" title="Administration">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                </a>
                <a href="profile.html" class="nav-icon" title="Mon Profil">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </a>
                <a href="commandes.html" class="nav-icon" title="Mes Commandes">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><path d="M16.5 9.4l-9-5.19M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
                </a>
                <button class="cart-btn" onclick="cart.openSidebar()" title="Panier">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>
                    <span id="cart-count">0</span>
                </button>
            </div>
        </div>
    </nav>

    <section class="section-padding" style="margin-top: 80px;">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Notre <span>Catalogue</span></h2>
                <p>Retrouvez tous vos articles pr&eacute;f&eacute;r&eacute;s.</p>
            </div>

            <div class="filters-wrap">
                <div class="category-tabs" id="category-tabs"></div>
                <div class="search-bar-wrap">
                    <input type="text" id="search-input" placeholder="Rechercher...">
                    <select id="sort-select" onchange="setSort(this.value)">
                        <option value="default">Par d&eacute;faut</option>
                        <option value="price-asc">Prix croissant</option>
                        <option value="price-desc">Prix d&eacute;croissant</option>
                    </select>
                </div>
                <div class="anime-filters" id="anime-filters"></div>
            </div>

            <div id="product-count" style="margin-bottom: 20px; color: var(--gray);"></div>
            <div class="products-grid" id="products-grid"></div>
            <div class="pagination" id="pagination"></div>
        </div>
    </section>

    <!-- Footer, Cart Sidebar and Modal copy from index.html (simplified for brevety here) -->
    <div class="cart-overlay" id="cart-overlay"></div>
    <div class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header"><h3>Panier</h3><button onclick="cart.closeSidebar()">×</button></div>
        <div class="cart-body" id="cart-body"></div>
        <div class="cart-footer">
            <div class="total-row"><span>Total</span><span id="cart-total">0 FCFA</span></div>
            <button class="btn-primary" style="width: 100%;" onclick="cart.checkout()">Payer</button>
        </div>
    </div>

    <div class="modal-overlay" id="product-modal">
        <div class="modal-container">
            <button onclick="closeModal('product-modal')" style="position: absolute; right: 20px; top: 20px; color: white;">×</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script src="js/cart.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
